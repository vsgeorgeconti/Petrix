services:
  db:
    build: .
    restart: unless-stopped
    environment:
      POSTGRES_USER: petrix
      POSTGRES_PASSWORD: petrix
      POSTGRES_DB: petrix_db
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petrix -d petrix_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata: