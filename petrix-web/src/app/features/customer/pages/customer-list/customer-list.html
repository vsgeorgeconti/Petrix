<div class="flex flex-col gap-3">
  <div class="flex justify-between items-center p-4 mb-6">
    <h2 class="text-4xl">Clientes</h2>
    <button class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition-colors">
      + Novo Cliente
    </button>
  </div>

  @if (state$ | async; as state) {
    @if (state.loading) {
      <div class="flex justify-center items-center py-10">
        <app-spinner></app-spinner>
      </div>
    }

    @if (state.error) {
      <p class="text-red-500 px-4">{{ state.error }}</p>
    }

    @if (!state.loading && !state.error) {
      <div class="px-4 mb-4">
        <input
          type="text"
          placeholder="Pesquisar clientes..."
          class="w-full px-4 py-2 mb-4 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500"
          (input)="onSearchChange($event)"
        />
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left">
          <thead>
            <tr class="border-b text-zinc-300 text-sm border-2 text-center">
              <th class="py-2 px-4 text-zinc-500">Nome</th>
              <th class="py-2 px-4 text-zinc-500">Email</th>
              <th class="py-2 px-4 text-zinc-500">Telefone</th>
              <th class="py-2 px-4 text-zinc-500">Ações</th>
            </tr>
          </thead>
          <tbody>
            @for (c of state.customers; track c.id) {
              <tr class="border-b border rounded-2xl text-zinc-300 bg-zinc-100 text-center hover:bg-gray-100 transition-colors">
                <td class="py-3 px-4 text-zinc-500">{{ c.name }}</td>
                <td class="py-3 px-4 text-zinc-500">{{ c.email }}</td>
                <td class="py-3 px-4 text-zinc-500">{{ c.phone }}</td>
                <td class="py-3 px-4 flex gap-2 m-1.5 justify-center">
                  <button
                    class="p-2 bg-blue-600 text-white rounded hover:bg-blue-500 transition-colors"
                    (click)="editCustomer(c.id)"
                  >Editar</button>
                  <button
                    class="p-2 bg-red-600 text-white rounded hover:bg-red-500 transition-colors"
                    (click)="onDeleteCustomer(c.id)"
                  >Excluir</button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    }
  }
</div>
