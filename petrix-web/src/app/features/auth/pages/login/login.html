<div class="flex justify-center items-center h-screen p-[3rem_1rem] border border-[#378add]">
  <div class="bg-white border border-[#e0e0e0] rounded-xl p-8 w-full max-w-85">
    <h2 class="text-lg font-medium mb-6">Entrar</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="flex flex-col gap-1.5 mb-0.5">
        <label class="text-sm font-medium">E-mail</label>
        <input class="h-10 p-3 mt-1.5 mb-2.5 border rounded-lg text-sm outline-0 focus:border-blue-700 focus:shadow-sm shadow-blue-200" type="email" formControlName="email" placeholder="seu@email.com" />
      </div>
      <div class="flex flex-col gap-6px mb-1px">
        <label class="text-sm font-medium">Senha</label>
        <input class="h-10 p-3 mt-1.5 mb-2.5  border rounded-lg text-sm outline-0 focus:border-blue-700 focus:shadow-sm shadow-blue-200" type="password" formControlName="password" placeholder="••••••••" />
      </div>
      <button class="w-full h-10 mt-4 rounded-2xl bg-blue-700 border-0 text-zinc-50 text-sm font-medium cursor-pointer disabled:opacity-50 disabled:cursor-not-allowed" type="submit" [disabled]="loginForm.invalid">Entrar</button>
    </form>

    <div *ngIf="errorMessage" class="w-full mt-2 p-2 py-2  flex flex-col items-center justify-center bg-red-50 text-red-600 border border-red-200 font-medium rounded-2xl">
       {{ errorMessage }} 
    </div>
  </div>
</div>
