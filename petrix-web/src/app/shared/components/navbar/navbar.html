<nav class="w-56 h-screen bg-zinc-100 border-r border-gray-200 flex flex-col flex-1 px-4 py-6 gap-2">
  <span class="font-semibold text-zinc-800 mb-4 px-2">Petrix</span>

  <a
    routerLink="/dashboard"
    routerLinkActive="bg-blue-50 text-blue-600"
    class="text-sm text-zinc-600 hover:bg-zinc-100 rounded-lg px-3 py-2 transition-colors"
  >
    Dashboard
  </a>
  <a
    routerLink="/customers"
    routerLinkActive="bg-blue-50 text-blue-600"
    class="text-sm text-zinc-600 hover:bg-zinc-100 rounded-lg px-3 py-2 transition-colors"
  >
    Clientes
  </a>
  @if (user; as u) {
    <div class="mt-auto border-t border-zinc-200 pt-4 relative">
      @if (menuOpen()) {
        <div
          class="absolute bottom-full mb-2 left-0 w-full bg-white border border-zinc-200 rounded-lg shadow-md"
        >
          <button
            (click)="logout()"
            class="w-full flex items-center gap-2 text-left px-4 py-2 text-sm text-red-500 hover:bg-zinc-100 rounded-lg transition-colors"
            type="button"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="w-4 h-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1"
              />
            </svg>
            Sair
          </button>
        </div>
      }

      <div
        (click)="toggleMenu()"
        class="flex items-center gap-1 hover:bg-zinc-100 rounded-lg px-3 py-2 transition-colors cursor-pointer"
      >
        <button
          class="w-10 h-10 rounded-full bg-blue-500 text-blue-100 font-bold shrink-0"
          type="button"
        >
          {{ getInitials(u.name) }}
        </button>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-zinc-800 truncate">{{ u.name }}</p>
          <p class="text-[9px] text-zinc-500 truncate">{{ u.email }}</p>
        </div>
      </div>
    </div>
  }
</nav>
